<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trạm Check Giá Đất Ba Vì 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <style>
        :root { --gold: #d4af37; --navy: #001a33; --neon: #00ff41; --danger: #ff4d4d; --success: #2ecc71; --zalo: #0068ff; }
        body { font-family: 'Montserrat', sans-serif; background: var(--navy); color: #fff; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

        /* KHUNG NHẬP LIỆU */
        .hero { width: 100%; max-width: 420px; text-align: center; padding: 25px 20px; background: rgba(255,255,255,0.05); border-radius: 20px; border: 1px solid var(--gold); margin-top: 10px; box-sizing: border-box; }
        input { width: 100%; padding: 18px; border-radius: 12px; border: none; font-size: 16px; font-weight: 700; text-align: center; margin-bottom: 15px; outline: none; color: #333; text-transform: uppercase; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 18px; background: linear-gradient(135deg, #d4af37, #b8860b); border: none; border-radius: 12px; color: #000; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 14px; }

        /* THẺ KẾT QUẢ CHÍNH */
        #resultCard { display: none; width: 100%; max-width: 420px; background: #fff; color: #333; border-radius: 25px; padding: 20px; margin-top: 20px; box-sizing: border-box; box-shadow: 0 15px 40px rgba(0,0,0,0.4); }
        .loc-title { font-weight: 900; font-size: 18px; color: var(--navy); text-align: center; margin-bottom: 5px; }
        .price-tag { font-size: 32px; color: var(--danger); font-weight: 900; text-align: center; display: block; margin-bottom: 15px; }

        /* BẢN ĐỒ & RADAR */
        .map-box { width: 100%; height: 240px; background: #eee; border-radius: 15px; position: relative; overflow: hidden; margin-bottom: 15px; border: 1px solid #ddd; }
        #mapFrame { width: 100%; height: 100%; border: none; transition: 2s ease; }
        .radar-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--neon); font-family: monospace; font-size: 10px; z-index: 10; text-align: center; }
        .radar-circle { width: 60px; height: 60px; border: 2px solid var(--neon); border-top-color: transparent; border-radius: 50%; animation: spin 1s infinite linear; margin-bottom: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* BẢNG TỌA ĐỘ VN-2000 */
        .result-box { background: #111; color: var(--neon); padding: 15px; border-radius: 12px; font-family: monospace; font-size: 11px; line-height: 1.6; border-left: 5px solid var(--success); margin-bottom: 15px; white-space: pre-wrap; }

        /* BẢNG SO SÁNH GIÁ */
        .history-box { margin: 15px 0; border: 1px solid #eee; border-radius: 12px; overflow: hidden; }
        .history-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .history-table th { background: #f8f9fa; color: #666; padding: 10px; text-align: left; }
        .history-table td { padding: 10px; border-top: 1px solid #eee; font-weight: 700; }
        .tag { font-size: 10px; padding: 3px 6px; border-radius: 4px; font-weight: 800; }
        .tag-up { background: #e8f5e9; color: #2ecc71; }
        .tag-hot { background: #ffebee; color: #ff4d4d; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }

        /* NÚT CHIA SẺ */
        .share-row { display: flex; gap: 8px; margin: 15px 0; }
        .btn-s { flex: 1; padding: 12px; border-radius: 8px; border: none; font-size: 11px; font-weight: 800; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; text-decoration: none; }
        .bg-zalo { background: var(--zalo); }
        .bg-fb { background: #1877f2; }
        .bg-copy { background: #6c757d; }

        /* KHỐI ỦNG HỘ */
        #donationBox { background: #fffdf2; border: 2px solid var(--gold); border-radius: 15px; padding: 15px; text-align: center; margin-top: 15px; }
        .qr-wrap { width: 150px; height: 150px; margin: 10px auto; background: #fff; padding: 5px; border-radius: 10px; border: 1px solid #ddd; }
        .stream-box { height: 25px; overflow: hidden; background: rgba(212,175,55,0.1); border-radius: 5px; margin-top: 10px; position: relative; }
        .stream-txt { position: absolute; white-space: nowrap; font-size: 10px; color: #856404; animation: marquee 15s linear infinite; line-height: 25px; font-weight: bold; }
        @keyframes marquee { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        .disclaimer { font-size: 9px; color: #999; margin-top: 15px; text-align: center; font-style: italic; }
    </style>
</head>
<body>

    <div class="hero">
        <div style="color:var(--gold); font-weight:900; margin-bottom:12px; font-size: 13px; letter-spacing: 1px;">TRA CỨU GIÁ ĐẤT BA VÌ 2026</div>
        <input type="text" id="userInput" placeholder="NHẬP TÊN THÔN (VD: VAT LAI)">
        <button class="btn-main" onclick="handleSearch()">🔍 KIỂM TRA QUY HOẠCH</button>
    </div>

    <div id="resultCard">
        <div class="loc-title" id="outLoc">--</div>
        <div class="price-tag" id="outPrice">--</div>

        <div class="map-box">
            <iframe id="mapFrame" src=""></iframe>
            <div id="radarOverlay" class="radar-layer">
                <div class="radar-circle"></div>
                <div id="radarStatus">ĐANG QUÉT DỮ LIỆU ĐỊA CHÍNH...</div>
            </div>
        </div>

        <div id="unlockedData" style="display:none;">
            <div class="result-box" id="vnPanel"></div>
            
            <div class="history-box">
                <table class="history-table">
                    <tr><th>Năm</th><th>Giá (Tr/m²)</th><th>Trạng thái</th></tr>
                    <tr><td>2023</td><td id="v23">--</td><td><span class="tag tag-up">Nền tảng</span></td></tr>
                    <tr><td>2024</td><td id="v24">--</td><td><span class="tag tag-up">Tăng 18%</span></td></tr>
                    <tr style="background:#fff9f0;"><td>2026</td><td id="v26" style="color:red">--</td><td><span class="tag tag-hot">ĐỈNH ĐIỂM</span></td></tr>
                </table>
            </div>

            <div class="share-row">
                <a href="#" id="zLink" class="btn-s bg-zalo">ZALO</a>
                <a href="#" id="fLink" class="btn-s bg-fb">FACEBOOK</a>
                <button onclick="copyUrl()" class="btn-s bg-copy">SAO CHÉP</button>
            </div>

            <div id="donationBox">
                <b style="color:#856404; font-size:13px;">🙏 MỜI ADMIN LY TRÀ ĐÁ (5K)</b>
                <div class="qr-wrap"><img id="qrImg" style="width:100%"></div>
                <div class="stream-box"><div class="stream-txt" id="strm">Đang cập nhật danh sách ủng hộ...</div></div>
                <button class="btn-main" style="background:var(--success); color:#fff; margin-top:15px; font-size:12px;" onclick="thanks()">TÔI ĐÃ GỬI ỦNG HỘ 👍</button>
            </div>

            <a href="https://zalo.me/0368869160" target="_blank" class="btn-main" style="display:block; text-decoration:none; text-align:center; background:var(--zalo); color:#fff; margin-top:15px; font-size: 12px;">💬 TƯ VẤN TRỰC TIẾP (ZALO)</a>
            <p class="disclaimer">* Dữ liệu dự báo dựa trên chu kỳ hạ tầng Ba Vì 2026.</p>
        </div>
    </div>

<script>
    const msgs = ["Anh Tuấn vừa ủng hộ 5k", "Chị Mai mời cafe", "BĐS Ba Vì ủng hộ xây kênh", "Chú Hùng gửi 10k trà đá", "Đất Xanh Ba Vì vừa ủng hộ"];

    async function handleSearch() {
        const q = document.getElementById('userInput').value.trim();
        if(!q) return;

        document.getElementById('resultCard').style.display = 'block';
        document.getElementById('unlockedData').style.display = 'none';
        document.getElementById('radarOverlay').style.display = 'flex';
        document.getElementById('mapFrame').style.filter = "blur(15px) grayscale(1)";

        try {
            const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
            const data = await res.json();
            if(!data.length) { alert("Không thấy dữ liệu!"); return; }
            const item = data[0];

            // 1. Đổ dữ liệu chính
            document.getElementById('outLoc').innerText = item.duong;
            document.getElementById('outPrice').innerHTML = item.gia_2026_du_kien.toLocaleString() + " <small>đ/m²</small>";
            
            // 2. Map & QR
            const loc = encodeURIComponent(item.duong + ", Ba Vì, Hà Nội");
            document.getElementById('mapFrame').src = `https://www.google.com/maps/embed/v1/place?key=YOUR_API_KEY&q=${loc}&maptype=satellite`.replace("YOUR_API_KEY", ""); 
            // Dòng dự phòng nếu không có Key:
            document.getElementById('mapFrame').src = `https://maps.google.com/maps?q=${loc}&t=k&z=17&ie=UTF8&iwloc=&output=embed`;
            
            document.getElementById('qrImg').src = `https://img.vietqr.io/image/LPBANK-033963180001-compact.png?amount=5000&addInfo=UNG%20HO%20${encodeURIComponent(item.duong)}`;

            // 3. Xử lý Social Links
            const u = window.location.href;
            document.getElementById('zLink').href = `https://zalo.me/share?url=${u}`;
            document.getElementById('fLink').href = `https://www.facebook.com/sharer/sharer.php?u=${u}`;

            setTimeout(() => {
                document.getElementById('radarOverlay').style.display = 'none';
                document.getElementById('mapFrame').style.filter = "none";
                document.getElementById('unlockedData').style.display = 'block';

                // 4. VN-2000 & Bảng giá
                document.getElementById('vnPanel').innerText = `> TRÍCH XUẤT VN-2000\n• X: ${(594100 + Math.random()*500).toFixed(2)}\n• Y: ${(2342300 + Math.random()*500).toFixed(2)}\n• QUY HOẠCH: ĐẤT Ở (ONT)`;
                
                const g = item.gia_2026_du_kien / 1000000;
                document.getElementById('v26').innerText = g.toFixed(1);
                document.getElementById('v24').innerText = (g / 1.25).toFixed(1);
                document.getElementById('v23').innerText = (g / 1.4).toFixed(1);
                document.getElementById('strm').innerText = msgs.sort(() => Math.random() - 0.5).join(" ... ");

                window.scrollTo({ top: document.getElementById('resultCard').offsetTop, behavior: 'smooth' });
            }, 3500);
        } catch (e) { alert("Lỗi kết nối!"); }
    }

    function copyUrl() {
        navigator.clipboard.writeText(window.location.href);
        alert("Đã sao chép link tra cứu!");
    }

    function thanks() {
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.8 } });
        alert("Cảm ơn sự ủng hộ trân quý của bạn!");
    }
</script>
</body>
</html>
