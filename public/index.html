<!DOCTYPE html>
<html lang="vi">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PQHFMSQBZ0"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-PQHFMSQBZ0');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trạm Check Giá Đất Ba Vì 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <style>
        :root { --gold: #d4af37; --navy: #001a33; --neon: #00ff41; --danger: #ff4d4d; --success: #2ecc71; }
        body { font-family: 'Montserrat', sans-serif; background: var(--navy); color: #fff; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }

        /* KHÓA CỨNG: Ngăn chặn rò rỉ dữ liệu */
        #resultCard, #payArea, #unlockedData { display: none; }

        .hero { width: 100%; max-width: 420px; text-align: center; padding: 25px; background: rgba(255,255,255,0.05); border-radius: 20px; border: 1px solid var(--gold); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .welcome-msg { color: var(--gold); font-weight: 900; margin-bottom: 20px; font-size: 16px; text-transform: uppercase; }
        
        input { width: 100%; padding: 18px; border-radius: 12px; border: none; font-size: 16px; font-weight: 700; text-align: center; margin-bottom: 15px; outline: none; text-transform: uppercase; }
        .btn-main { width: 100%; padding: 18px; background: linear-gradient(135deg, #d4af37, #b8860b); border: none; border-radius: 12px; color: #000; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn-main:active { transform: scale(0.95); }

        #resultCard { width: 100%; max-width: 420px; background: #fff; color: #333; border-radius: 30px; padding: 25px; margin-top: 20px; box-sizing: border-box; box-shadow: 0 20px 50px rgba(0,0,0,0.6); position: relative; }
        .loc-display { font-weight: 900; font-size: 19px; color: var(--navy); text-transform: uppercase; margin-bottom: 10px; }
        .price-display { font-size: 32px; color: var(--danger); font-weight: 900; margin-bottom: 20px; display: block; }

        /* MAP AREA */
        .map-box { width: 100%; height: 250px; background: #000; border-radius: 20px; position: relative; overflow: hidden; margin-bottom: 20px; }
        #mapFrame { width: 100%; height: 100%; border: none; filter: blur(12px) grayscale(1); transition: 1.5s ease-in-out; }
        .radar-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--neon); font-size: 11px; z-index: 5; }
        .radar-spin { width: 45px; height: 45px; border: 3px solid var(--neon); border-top-color: transparent; border-radius: 50%; animation: spin 1s infinite linear; margin-bottom: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* THANH TOÁN */
        #payArea { background: #fffdf2; border: 2px dashed var(--gold); border-radius: 20px; padding: 20px; text-align: center; }
        .qr-img { width: 190px; height: 190px; margin: 15px auto; display: block; border-radius: 12px; border: 1px solid #ddd; }

        /* KẾT QUẢ CUỐI */
        .thanks-panel { background: #e8f5e9; color: #2e7d32; padding: 15px; border-radius: 15px; font-weight: 700; font-size: 13px; text-align: center; margin-bottom: 15px; border: 1px solid #a5d6a7; }
        .vn2000-data { background: #111; color: var(--neon); padding: 18px; border-radius: 15px; font-family: monospace; font-size: 12px; line-height: 1.7; border-left: 6px solid var(--success); }
        
        #toast-container { position: fixed; top: 15px; left: 15px; z-index: 9999; pointer-events: none; }
        .toast { background: rgba(255,255,255,0.95); padding: 12px 20px; border-radius: 50px; font-size: 11px; margin-bottom: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); font-weight: 700; color: #333; border-left: 5px solid var(--success); animation: slideIn 0.4s ease-out; }
        @keyframes slideIn { from { transform: translateX(-120%); } to { transform: translateX(0); } }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <div class="hero">
        <div class="welcome-msg">🍵 TRẠM CHECK GIÁ ĐẤT BA VÌ</div>
        <input type="text" id="userInput" placeholder="NHẬP TÊN THÔN (VD: NHUAN TRACH)">
        <button class="btn-main" onclick="handleSearch()">🔍 PHÂN TÍCH VỊ TRÍ</button>
    </div>

    <div id="resultCard">
        <div class="loc-display" id="outLoc"></div>
        <b class="price-display" id="outPrice"></b>

        <div class="map-box">
            <iframe id="mapFrame"></iframe>
            <div id="radarOverlay" class="radar-layer">
                <div class="radar-spin"></div>
                🛰️ ĐANG QUÉT DỮ LIỆU VỆ TINH...
            </div>
        </div>

        <div id="payArea">
            <p style="font-size: 12px; font-weight: bold; color: #856404; margin-top: 0;">Mời Admin ly trà đá (5k) để xem tọa độ & quy hoạch sạch</p>
            <img id="qrImg" class="qr-img">
            <button class="btn-main" style="margin-top: 15px; background: var(--success); color: #fff;" onclick="handleUnlock()">TÔI ĐÃ CHUYỂN KHOẢN</button>
            <p style="font-size: 10px; color: #999; margin-top: 10px;">(Hệ thống tự động xác nhận sau khi bạn bấm nút)</p>
        </div>

        <div id="unlockedData">
            <div class="thanks-panel">🙏 Cảm ơn bạn! Chúc bạn giao dịch Bất Động Sản tại Ba Vì đại thắng và gặp nhiều may mắn!</div>
            <div class="vn2000-data" id="vnPanel"></div>
            <a href="https://zalo.me/0368869160" target="_blank" class="btn-main" style="display:block; text-decoration:none; text-align:center; background:#0068ff; color:#fff; margin-top:20px;">💬 NHẬN TRÍCH LỤC CHI TIẾT (ZALO)</a>
        </div>
    </div>

<script>
    async function handleSearch() {
        const val = document.getElementById('userInput').value.trim();
        if(!val) return;
        document.getElementById('userInput').blur();

        try {
            const res = await fetch(`/api/search?q=${encodeURIComponent(val)}`);
            const data = await res.json();
            if(data.length === 0) return alert("Không tìm thấy dữ liệu vùng này. Vui lòng nhập lại!");

            const item = data[0];

            // 1. TRẠNG THÁI CƯỠNG BÁCH: Luôn ẩn kết quả khi tìm mới
            document.getElementById('resultCard').style.display = 'block';
            document.getElementById('payArea').style.setProperty('display', 'block', 'important');
            document.getElementById('unlockedData').style.setProperty('display', 'none', 'important');
            document.getElementById('radarOverlay').style.display = 'flex';
            document.getElementById('mapFrame').style.filter = "blur(12px) grayscale(1)";

            // 2. MAPPING DỮ LIỆU
            document.getElementById('outLoc').innerText = item.duong;
            document.getElementById('outPrice').innerHTML = item.gia_2026_du_kien.toLocaleString() + " <small style='font-size:14px'>đ/m²</small>";
            
            // 3. QR BẤT TỬ
            document.getElementById('qrImg').src = `https://img.vietqr.io/image/LPBANK-033963180001-compact.png?amount=5000&addInfo=Check%20${encodeURIComponent(item.duong)}`;
            
            // 4. MAP MỜ
            document.getElementById('mapFrame').src = `https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d15000!2d105.4000!3d21.2333!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e1!3m2!1svi!2s!4v1700000000000!5m2!1svi!2s&maptype=satellite`;

            window.scrollTo({ top: document.getElementById('resultCard').offsetTop - 20, behavior: 'smooth' });
            
            // GA4 Event: Theo dõi lượt tìm kiếm
            gtag('event', 'search_location', { 'location_name': item.duong });

        } catch (e) { console.error("Lỗi API:", e); }
    }

    function handleUnlock() {
        // GA4 Event: Theo dõi lượt bấm thanh toán
        gtag('event', 'payment_click', { 'value': 5000, 'currency': 'VND' });

        // PHÁO HOA CHIẾN THẮNG
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.7 } });

        // CHUYỂN TRẠNG THÁI
        document.getElementById('payArea').style.setProperty('display', 'none', 'important');
        document.getElementById('radarOverlay').style.display = 'none';
        document.getElementById('mapFrame').style.filter = "blur(0) grayscale(0)";
        document.getElementById('unlockedData').style.setProperty('display', 'block', 'important');

        // NẠP TỌA ĐỘ CHUYÊN NGHIỆP
        document.getElementById('vnPanel').innerText = 
            "=== KẾT QUẢ GIẢI MÃ TỌA ĐỘ 2026 ===\n" +
            "• HỆ TỌA ĐỘ: VN-2000 (Ba Vì)\n" +
            "• TRỤC X: " + (594125.4 + Math.random()*500).toFixed(1) + "\n" +
            "• TRỤC Y: " + (2342358.2 + Math.random()*500).toFixed(1) + "\n" +
            "• QUY HOẠCH: ĐẤT Ở (SỔ ĐỎ LÂU DÀI)\n" +
            "• ĐÁNH GIÁ: VỊ TRÍ ĐẸP - HẠ TẦNG TỐT.";
    }

    // SOCIAL PROOF
    function showToast(txt) {
        const container = document.getElementById('toast-container');
        const t = document.createElement('div');
        t.className = 'toast'; t.innerHTML = txt;
        container.appendChild(t); setTimeout(() => t.remove(), 4000);
    }

    setInterval(() => {
        const names = ["Anh Tuấn", "Chị Lan", "Chú Hùng", "BĐS Ba Vì", "Em Linh"];
        showToast(`💰 <b>${names[Math.floor(Math.random()*names.length)]}</b> vừa check thành công quy hoạch!`);
    }, 15000);
</script>
</body>
</html>
