<!DOCTYPE html>
<html lang="vi">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PQHFMSQBZ0"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-PQHFMSQBZ0');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hệ Thống Trích Lục Tọa Độ Ba Vì 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <style>
        :root { --gold: #d4af37; --navy: #001a33; --neon: #00ff41; --danger: #ff4d4d; --success: #2ecc71; }
        body { font-family: 'Montserrat', sans-serif; background: var(--navy); color: #fff; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

        /* KHÓA CỨNG: Ngăn chặn rò rỉ khi chưa thanh toán */
        #resultCard, #payArea, #unlockedData, #btnConfirmFinal { display: none; }

        .hero { width: 100%; max-width: 420px; text-align: center; padding: 25px 20px; background: rgba(255,255,255,0.05); border-radius: 20px; border: 1px solid var(--gold); margin-top: 10px; }
        input { width: 100%; padding: 18px; border-radius: 12px; border: none; font-size: 16px; font-weight: 700; text-align: center; margin-bottom: 15px; outline: none; color: #333; text-transform: uppercase; }
        .btn-main { width: 100%; padding: 18px; background: linear-gradient(135deg, #d4af37, #b8860b); border: none; border-radius: 12px; color: #000; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 14px; }

        /* CARD KẾT QUẢ */
        #resultCard { width: 100%; max-width: 420px; background: #fff; color: #333; border-radius: 25px; padding: 20px; margin-top: 20px; box-sizing: border-box; box-shadow: 0 15px 40px rgba(0,0,0,0.4); }
        .loc-title { font-weight: 900; font-size: 18px; color: var(--navy); text-align: center; margin-bottom: 5px; }
        .price-tag { font-size: 30px; color: var(--danger); font-weight: 900; text-align: center; display: block; margin-bottom: 15px; }

        /* MAP VỆ TINH MỜ */
        .map-box { width: 100%; height: 240px; background: #eee; border-radius: 15px; position: relative; overflow: hidden; margin-bottom: 15px; }
        #mapFrame { width: 100%; height: 100%; border: none; filter: blur(20px) grayscale(1); transition: 2s ease; pointer-events: none; }
        .radar-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--neon); font-family: monospace; font-size: 10px; z-index: 10; text-align: center; }
        .radar-circle { width: 50px; height: 50px; border: 2px solid var(--neon); border-top-color: transparent; border-radius: 50%; animation: spin 1s infinite linear; margin-bottom: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* THANH TOÁN */
        #payArea { background: #fffdf2; border: 2px dashed var(--gold); border-radius: 15px; padding: 20px; text-align: center; }
        .qr-wrap { width: 180px; height: 180px; margin: 10px auto; background: #fff; padding: 5px; border-radius: 10px; border: 1px solid #ddd; }
        .wait-msg { font-size: 11px; color: #b8860b; font-weight: bold; margin-top: 10px; }

        /* KẾT QUẢ CUỐI */
        .result-box { background: #111; color: var(--neon); padding: 15px; border-radius: 12px; font-family: monospace; font-size: 11px; line-height: 1.6; border-left: 5px solid var(--success); }
        .proverb-box { background: #e8f5e9; color: #2e7d32; padding: 15px; border-radius: 12px; font-size: 12px; font-weight: 700; margin-bottom: 15px; border: 1px solid #a5d6a7; text-align: center; }
        .disclaimer { font-size: 9px; color: #999; margin-top: 15px; text-align: center; font-style: italic; }

        /* Toasts */
        #toast-wrap { position: fixed; top: 15px; left: 15px; z-index: 9999; }
        .toast { background: white; color: #333; padding: 10px 15px; border-radius: 30px; font-size: 10px; margin-bottom: 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-left: 4px solid var(--success); font-weight: 700; }
    </style>
</head>
<body>

    <div id="toast-wrap"></div>

    <div class="hero">
        <div style="color:var(--gold); font-weight:900; margin-bottom:15px; font-size: 14px;">🍵 TRẠM CHECK GIÁ ĐẤT BA VÌ</div>
        <input type="text" id="userInput" placeholder="NHẬP TÊN THÔN (VD: VAT LAI)">
        <button class="btn-main" onclick="handleSearch()">🔍 BẮT ĐẦU PHÂN TÍCH</button>
    </div>

    <div id="resultCard">
        <div class="loc-title" id="outLoc"></div>
        <div class="price-tag" id="outPrice"></div>

        <div class="map-box">
            <iframe id="mapFrame" src=""></iframe>
            <div id="radarOverlay" class="radar-layer">
                <div class="radar-circle"></div>
                <div id="radarStatus">ĐANG TRUY VẤN VỆ TINH...</div>
            </div>
        </div>

        <div id="payArea">
            <p style="font-size: 12px; font-weight: bold; color: #856404; margin: 0;">Mời Admin ly trà đá (5k) để mở khóa bản đồ</p>
            <div class="qr-wrap">
                <img id="qrImg" style="width:100%; height:100%; object-fit:contain;">
            </div>
            
            <div id="waitMsg" class="wait-msg">Đang khởi tạo mã giao dịch... (5s)</div>
            
            <button id="btnConfirmFinal" class="btn-main" style="background: var(--success); color: #fff; margin-top: 10px;" onclick="handleUnlock()">TÔI ĐÃ GỬI TRÀ ĐÁ</button>
        </div>

        <div id="unlockedData" style="display: none;">
            <div class="proverb-box">
                🙏 CẢM ƠN BẠN!<br>
                <span id="randomQuote" style="font-weight: 400; font-style: italic;"></span>
            </div>
            <div class="result-box" id="vnPanel"></div>
            <a href="https://zalo.me/0368869160" target="_blank" class="btn-main" style="display:block; text-decoration:none; text-align:center; background:#0068ff; color:#fff; margin-top:15px; font-size: 12px;">💬 NHẬN TRÍCH LỤC FULL (ZALO)</a>
            <p class="disclaimer">* Dữ liệu dự báo 2026 mang tính chất tham khảo đầu tư.</p>
        </div>
    </div>

<script>
    // 1. Danh sách châm ngôn tăng uy tín
    const quotes = [
        "\"Mua vàng thì lỗ, mua thổ thì lời. Chúc bạn đại thắng tại Ba Vì!\"",
        "\"Đất lành chim đậu. Chúc bạn tìm được mảnh đất vượng khí, sinh tài lộc!\"",
        "\"Người đẻ chứ đất không đẻ. Chúc mừng bạn đã nắm bắt đúng thời cơ vàng!\"",
        "\"Đầu tư hôm nay, thảnh thơi mai sau. Ba Vì 2026 - Tầm nhìn chiến lược.\""
    ];

    async function handleSearch() {
        const query = document.getElementById('userInput').value.trim();
        if(!query) return;
        document.getElementById('userInput').blur();

        try {
            // Gọi API lấy dữ liệu
            const res = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
            const data = await res.json();
            if(data.length === 0) return alert("Vùng này đang cập nhật dữ liệu. Vui lòng thử thôn khác!");

            const item = data[0];

            // BƯỚC 1: KHÓA CHẶT TRẠNG THÁI (Tránh hiện nút xác nhận sớm)
            document.getElementById('resultCard').style.display = 'block';
            document.getElementById('payArea').style.display = 'none'; // Ẩn vùng thanh toán lúc đầu
            document.getElementById('unlockedData').style.display = 'none'; // Khóa kết quả
            document.getElementById('btnConfirmFinal').style.display = 'none'; // Khóa nút xác nhận
            document.getElementById('radarOverlay').style.display = 'flex';
            document.getElementById('mapFrame').style.filter = "blur(20px) grayscale(1)";
            document.getElementById('radarStatus').innerText = "ĐANG TRUY VẤN VỆ TINH ĐỊA CHÍNH...";

            // BƯỚC 2: NẠP DỮ LIỆU MAPPING
            document.getElementById('outLoc').innerText = item.duong;
            document.getElementById('outPrice').innerHTML = item.gia_2026_du_kien.toLocaleString() + " <small style='font-size:14px'>đ/m²</small>";
            
            // Cập nhật bản đồ đúng vị trí thôn + Chế độ vệ tinh (t=k)
            const mapSearchUrl = `https://www.google.com/maps?q=${encodeURIComponent(item.duong + " Ba Vì Hà Nội")}&output=embed&t=k`;
            document.getElementById('mapFrame').src = mapSearchUrl;

            // BƯỚC 3: HIỆU ỨNG QUÉT TÂM LÝ (3 giây)
            setTimeout(() => {
                document.getElementById('radarStatus').innerText = "ĐÃ XÁC ĐỊNH VỊ TRÍ. ĐANG KHỞI TẠO MÃ GIAO DỊCH...";
                document.getElementById('payArea').style.display = 'block';
                document.getElementById('qrImg').src = `https://img.vietqr.io/image/LPBANK-033963180001-compact.png?amount=5000&addInfo=Check%20${encodeURIComponent(item.duong)}`;
                
                // BƯỚC 4: TRÌ HOÃN HIỆN NÚT XÁC NHẬN (Thêm 5 giây nữa)
                // Ép khách hàng phải nhìn mã QR ít nhất 5 giây mới cho bấm xác nhận
                setTimeout(() => {
                    document.getElementById('waitMsg').style.display = 'none';
                    document.getElementById('btnConfirmFinal').style.display = 'block';
                    document.getElementById('radarStatus').innerText = "VỊ TRÍ ĐÃ KHOANH VÙNG - CHỜ MỞ KHÓA...";
                }, 5000);

            }, 3000);

            // Cuộn mượt xuống phần kết quả
            window.scrollTo({ top: document.getElementById('resultCard').offsetTop - 20, behavior: 'smooth' });
            
            // Gửi sự kiện về GA4
            gtag('event', 'search_land_pro', { 'location': item.duong });

        } catch (e) { 
            console.error("Lỗi truy vấn:", e);
            alert("Hệ thống bận, vui lòng thử lại sau giây lát!");
        }
    }

    function handleUnlock() {
        // Hiệu ứng pháo hoa khi khách bấm xác nhận
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.8 } });

        // MỞ KHÓA TUYỆT ĐỐI
        document.getElementById('payArea').style.display = 'none'; // Ẩn QR
        document.getElementById('radarOverlay').style.display = 'none'; // Tắt radar
        document.getElementById('mapFrame').style.filter = "blur(0) grayscale(0)"; // Làm rõ bản đồ
        document.getElementById('mapFrame').style.pointerEvents = "auto"; // Cho phép tương tác map
        document.getElementById('unlockedData').style.display = 'block'; // Hiện kết quả tọa độ

        // Chọn châm ngôn ngẫu nhiên để cảm ơn khách
        document.getElementById('randomQuote').innerText = quotes[Math.floor(Math.random() * quotes.length)];
        
        // Đổ dữ liệu tọa độ giả lập (Dữ liệu này khách rất thích xem)
        document.getElementById('vnPanel').innerText = 
            "> ĐANG TRÍCH XUẤT DỮ LIỆU VN-2000...\n" +
            "------------------------------------\n" +
            "• TRẠM CHIẾU: BA VÌ - HÀ NỘI\n" +
            "• TỌA ĐỘ X: " + (594100 + Math.random()*900).toFixed(2) + "\n" +
            "• TỌA ĐỘ Y: " + (2342300 + Math.random()*900).toFixed(2) + "\n" +
            "• LOẠI ĐẤT: ĐẤT Ở (NÔNG THÔN/ĐÔ THỊ)\n" +
            "• QUY HOẠCH: ĐƯỜNG GIAO THÔNG MỞ RỘNG (DỰ KIẾN)\n" +
            "• TRẠNG THÁI: DỮ LIỆU ĐÃ ĐƯỢC GIẢI MÃ.";

        // GA4 Chuyển đổi thành công
        gtag('event', 'payment_success_tea', { 'value': 5000, 'currency': 'VND' });
    }

    // Hiển thị thông báo "ảo" để kích cầu (Social Proof)
    function showToast(msg) {
        const wrap = document.getElementById('toast-wrap') || document.getElementById('toast-container');
        if(!wrap) return;
        const t = document.createElement('div');
        t.className = 'toast'; 
        t.style.cssText = "background:white; color:#333; padding:10px 15px; border-radius:30px; font-size:10px; margin-bottom:5px; box-shadow:0 4px 10px rgba(0,0,0,0.1); border-left:4px solid #2ecc71; font-weight:700;";
        t.innerHTML = msg;
        wrap.appendChild(t); 
        setTimeout(() => t.remove(), 4000);
    }

    setInterval(() => {
        const users = ["Anh Tuấn", "Chị Lan", "Chú Hùng", "BĐS Ba Vì", "Môi giới 24h"];
        const locs = ["Vật Lại", "Tây Đằng", "Yên Bài", "Vạn Thắng"];
        showToast(`✅ <b>${users[Math.floor(Math.random()*users.length)]}</b> vừa check thành công tại ${locs[Math.floor(Math.random()*locs.length)]}!`);
    }, 25000);
</script>
</body>
</html>
