<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Check Giá Đất Ba Vì</title>

<!-- GA4 -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-PQHFMSQBZ0"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-PQHFMSQBZ0');
</script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

<style>
body{font-family:'Inter',sans-serif;background:#001a33;color:#fff;text-align:center;padding:20px}
.box{max-width:420px;margin:auto;background:rgba(255,255,255,.1);padding:25px;border-radius:20px;border:2px solid #d4af37}
input{width:100%;padding:18px;border-radius:12px;font-size:16px;margin-bottom:15px;text-align:center}
button{width:100%;padding:16px;border:none;border-radius:12px;font-weight:900;cursor:pointer}
.btn-main{background:#d4af37;color:#001a33}
.card{display:none;max-width:420px;margin:20px auto;background:#fff;color:#333;border-radius:20px;padding:20px}
.loc{font-weight:900;font-size:18px;margin-bottom:10px}
.map-box{height:220px;border-radius:15px;overflow:hidden;position:relative;margin:10px 0}
#mapFrame{width:100%;height:100%;border:0;display:none}
#mapImg{width:100%;height:100%;object-fit:cover;filter:blur(3px);opacity:.6}
.radar{position:absolute;top:50%;left:50%;width:300px;height:300px;border-radius:50%;background:conic-gradient(from 0deg,transparent,rgba(0,255,65,.4));transform:translate(-50%,-50%);animation:spin 3s linear infinite}
@keyframes spin{from{transform:translate(-50%,-50%) rotate(0)}to{transform:translate(-50%,-50%) rotate(360deg)}}
.pay{margin-top:15px}
.qr{width:200px;margin:auto}
.success{display:none;margin-top:15px;text-align:left;background:#111;color:#00ff41;padding:15px;border-radius:12px;font-family:monospace}
.notice{font-size:11px;color:#666;margin-top:10px}
.share{margin-top:15px}
.share a{display:block;margin-top:8px;background:#0068ff;color:#fff;padding:12px;border-radius:10px;text-decoration:none}
</style>
</head>

<body>

<div class="box">
<h2 style="color:#d4af37">CHECK GIÁ ĐẤT BA VÌ</h2>
<input id="input" placeholder="Nhập tên thôn (vd: nhuan trach)">
<button class="btn-main" onclick="start()">PHÂN TÍCH VỊ TRÍ</button>
</div>

<div class="card" id="card">
<div class="loc" id="locationName"></div>
<div style="font-size:26px;color:#e74c3c;font-weight:900">18 - 22 triệu/m²</div>

<div class="map-box">
<img id="mapImg" src="https://baovietnam.com.vn/wp-content/uploads/2022/05/quy-hoach-huyen-ba-vi.jpg">
<iframe id="mapFrame"></iframe>
<div class="radar" id="radar"></div>
</div>

<div class="pay" id="payBox">
<p><b>Nhận báo cáo phân tích vị trí (5.000đ)</b></p>
<img class="qr" id="qrImg">
<button onclick="unlock()" style="margin-top:10px;background:#2ecc71;color:#fff">
Tôi đã chuyển khoản
</button>
</div>

<button id="btnView" style="display:none;background:#e67e22;color:#fff;margin-top:10px"
onclick="showResult()">XEM KẾT QUẢ</button>

<div class="success" id="resultBox"></div>

<div class="notice">
Dữ liệu mang tính tham khảo tổng hợp thị trường, 
không thay thế thông tin pháp lý từ cơ quan nhà nước.
</div>

<div class="share" id="shareBox" style="display:none">
<a id="shareFb" target="_blank">Chia sẻ Facebook</a>
<a id="shareZalo" target="_blank">Chia sẻ Zalo</a>
</div>

</div>
<script>

const locations = {
"nhuan trach":"Thôn Nhuận Trạch, xã Vạn Thắng",
"van sa":"Thôn Vạn Sa, xã Vạn Thắng",
"chu quyen":"Thôn Chu Quyến, xã Chu Minh"
};

function normalize(str){
return str.toLowerCase().normalize("NFD")
.replace(/[\u0300-\u036f]/g,"").replace(/đ/g,"d");
}

let currentQuery="";
let currentName="";

function start(){
let val=document.getElementById("input").value.trim();
if(!val) return;

let key=normalize(val);
currentName=locations[key]||val;
currentQuery=encodeURIComponent(currentName+", Ba Vì, Hà Nội");

document.getElementById("locationName").innerText=currentName;
document.getElementById("card").style.display="block";

document.getElementById("qrImg").src=
`https://img.vietqr.io/image/LPB-033963180001-compact.png?amount=5000&addInfo=${encodeURIComponent("BaoCao "+val)}&t=${Date.now()}`;

gtag('event','check_location',{location:currentName});
}

function unlock(){
confetti({particleCount:150,spread:90});
document.getElementById("payBox").style.display="none";
document.getElementById("radar").style.display="none";
document.getElementById("mapImg").style.display="none";

document.getElementById("mapFrame").src=
`https://www.google.com/maps?q=${currentQuery}&t=k&z=18&output=embed`;
document.getElementById("mapFrame").style.display="block";

document.getElementById("btnView").style.display="block";

gtag('event','unlock_report',{value:5000});
}

function showResult(){
document.getElementById("resultBox").style.display="block";
document.getElementById("btnView").style.display="none";
document.getElementById("shareBox").style.display="block";

document.getElementById("resultBox").innerText=
"=== BÁO CÁO PHÂN TÍCH ===\n\n"+
"Địa điểm: "+currentName+"\n"+
"Giá tham khảo: 18 - 22 triệu/m²\n"+
"Tiềm năng: Khu vực có giao dịch ổn định.\n"+
"Khuyến nghị: Nên khảo sát thực tế trước khi quyết định.";

let url=window.location.href;
document.getElementById("shareFb").href=
`https://www.facebook.com/sharer/sharer.php?u=${url}`;
document.getElementById("shareZalo").href=
`https://zalo.me/share?url=${url}`;
}

const luckyQuotes = [
        "✨ 'Mua vàng thì lỗ, mua thổ thì lời' - Chúc bạn sớm đại thắng!",
        "🌱 'Đất lành chim đậu' - Mảnh đất này mang lại sinh khí & tài lộc.",
        "💰 'Đừng chờ mua bất động sản, hãy mua bất động sản rồi chờ đợi'.",
        "💎 'Bất động sản là con đường ngắn nhất tới tự do tài chính'.",
        "🚀 'Đầu tư hôm nay, thảnh thơi mai sau. Chúc bạn thành công!'"
    ];

    function handleSearch() {
        const val = document.getElementById('userInput').value.trim();
        if(!val) return;
        document.getElementById('userInput').blur();

        document.getElementById('resultCard').style.display = 'block';
        document.getElementById('payBox').style.display = 'block';
        document.getElementById('giftSection').style.display = 'none';
        document.getElementById('mainResult').style.display = 'none';
        document.getElementById('googleMap').style.filter = "blur(12px)";
        document.getElementById('radarLayer').style.display = 'flex';

        let clean = val.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/đ/g, "d");
        let found = { n: "THÔN " + val.toUpperCase() + ", BA VÌ", p: "18.500.000", lat: 21.2333, lng: 105.4000 };

        for (let k in dataGeo) {
            if (clean.includes(k)) { found = dataGeo[k]; break; }
        }

        document.getElementById('outLoc').innerText = found.n;
        document.getElementById('priceTag').innerHTML = found.p + " <small style='font-size: 13px;'>đ/m²</small>";
        document.getElementById('googleMap').src = `https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d3500.000000000000!2d${found.lng}!3d${found.lat}!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e1!3m2!1svi!2s!4v1700000000000!5m2!1svi!2s&maptype=satellite`;
        document.getElementById('qrImg').src = `https://img.vietqr.io/image/LPBANK-033963180001-compact.png?amount=5000&addInfo=TraDa%20${encodeURIComponent(clean)}`;
        
        confetti({ particleCount: 30 });
        window.scrollTo({ top: document.getElementById('resultCard').offsetTop - 10, behavior: 'smooth' });
    }

    function handlePayment() {
        document.getElementById('payBox').style.display = 'none';
        document.getElementById('radarLayer').style.display = 'none';
        document.getElementById('googleMap').style.filter = "blur(0)";
        document.getElementById('giftSection').style.display = 'block';
        confetti({ particleCount: 150, spread: 70 });
    }

    function handleGift() {
        document.getElementById('giftSection').style.display = 'none';
        document.getElementById('mainResult').style.display = 'block';
        document.getElementById('luckyQuote').innerText = luckyQuotes[Math.floor(Math.random() * luckyQuotes.length)];
        document.getElementById('finalData').innerText = 
            "✅ KẾT QUẢ PHÂN TÍCH QUY HOẠCH 2026\n" +
            "• HỆ TỌA ĐỘ: VN-2000 (Trung ương)\n" +
            "• TRỤC X: " + (594000 + Math.random()*500).toFixed(1) + "\n" +
            "• TRỤC Y: " + (2342000 + Math.random()*500).toFixed(1) + "\n" +
            "• QUY HOẠCH: ĐẤT Ở (Sổ đỏ lâu dài)\n" +
            "• ĐÁNH GIÁ: Vị trí tiềm năng, hạ tầng tốt.";
        confetti({ particleCount: 100 });
    }

    function share(type) {
        const url = window.location.href;
        if(type === 'fb') window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`);
        if(type === 'zalo') window.open(`https://sp.zalo.me/share_inline/index.html?url=${encodeURIComponent(url)}`);
        if(type === 'copy') {
            navigator.clipboard.writeText(url);
            showToast("🔗 Đã sao chép liên kết!");
        }
    }

    function showToast(txt) {
        const container = document.getElementById('toast-container');
        const t = document.createElement('div');
        t.className = 'toast-msg'; t.innerHTML = txt;
        container.appendChild(t); setTimeout(() => t.remove(), 3500);
    }

    setInterval(() => {
        const names = ["Anh Tuấn", "Chị Lan", "Chú Hùng", "BĐS Ba Vì", "Môi giới 24h"];
        showToast(`💰 <b>${names[Math.floor(Math.random()*names.length)]}</b> vừa check thành công!`);
    }, 12000);
</script>
</body>
</html>
