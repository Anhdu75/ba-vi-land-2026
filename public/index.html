<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Check Giá Đất</title>

<script async src="https://www.googletagmanager.com/gtag/js?id=G-PQHFMSQBZ0"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-PQHFMSQBZ0');
</script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

<style>
body{font-family:'Inter',sans-serif;background:#001a33;color:#fff;text-align:center;padding:20px}
.box{max-width:420px;margin:auto;background:rgba(255,255,255,.1);padding:25px;border-radius:20px;border:2px solid #d4af37}
input{width:100%;padding:18px;border-radius:12px;font-size:16px;margin-bottom:15px;text-align:center}
button{width:100%;padding:16px;border:none;border-radius:12px;font-weight:900;cursor:pointer}
.btn-main{background:#d4af37;color:#001a33}
.card{display:none;max-width:420px;margin:20px auto;background:#fff;color:#333;border-radius:20px;padding:20px}
.loc{font-weight:900;font-size:18px;margin-bottom:10px}
.map-box{height:220px;border-radius:15px;overflow:hidden;position:relative;margin:10px 0}
#mapFrame{width:100%;height:100%;border:0;display:none}
#mapImg{width:100%;height:100%;object-fit:cover;filter:blur(3px);opacity:.6}
.radar{position:absolute;top:50%;left:50%;width:300px;height:300px;border-radius:50%;background:conic-gradient(from 0deg,transparent,rgba(0,255,65,.4));transform:translate(-50%,-50%);animation:spin 3s linear infinite}
@keyframes spin{from{transform:translate(-50%,-50%) rotate(0)}to{transform:translate(-50%,-50%) rotate(360deg)}}
.pay{margin-top:15px}
.qr{width:200px;margin:auto}
.success{display:none;margin-top:15px;text-align:left;background:#111;color:#00ff41;padding:15px;border-radius:12px;font-family:monospace;white-space:pre-line}
.notice{font-size:11px;color:#666;margin-top:10px}
.share{margin-top:15px;display:none}
.share a{display:block;margin-top:8px;background:#0068ff;color:#fff;padding:12px;border-radius:10px;text-decoration:none}
#btnView{display:none !important;background:#e67e22;color:#fff;margin-top:10px}
</style>
</head>

<body>

<div class="box">
<h2 style="color:#d4af37">CHECK GIÁ ĐẤT</h2>
<input id="input" placeholder="Nhập tên thôn (vd: nhuan trach)">
<button class="btn-main" onclick="start()">PHÂN TÍCH VỊ TRÍ</button>
</div>

<div class="card" id="card">
<div class="loc" id="locationName"></div>
<div style="font-size:26px;color:#e74c3c;font-weight:900" id="priceTop"></div>

<div class="map-box">
<img id="mapImg" src="https://baovietnam.com.vn/wp-content/uploads/2022/05/quy-hoach-huyen-ba-vi.jpg">
<iframe id="mapFrame"></iframe>
<div class="radar" id="radar"></div>
</div>

<div class="pay" id="payBox">
<p><b>Nhận báo cáo phân tích vị trí (5.000đ)</b></p>
<img class="qr" id="qrImg">
<button onclick="unlock()" style="margin-top:10px;background:#2ecc71;color:#fff">
Tôi đã chuyển khoản
</button>
</div>

<button id="btnView" onclick="showResult()">XEM KẾT QUẢ</button>

<div class="success" id="resultBox"></div>

<div class="notice">
Thông tin mang tính tham khảo tổng hợp thị trường, 
không thay thế thông tin pháp lý từ cơ quan nhà nước.
</div>

<div class="share" id="shareBox">
<a id="shareFb" target="_blank">Chia sẻ Facebook</a>
<a id="shareZalo" target="_blank">Chia sẻ Zalo</a>
</div>

</div>

<script>

const locations = {
"nhuan trach": {name:"Thôn Nhuận Trạch, khu vực Vạn Thắng", lat:21.2333, lng:105.4000, price:"18 - 22 triệu/m²"},
"van sa": {name:"Thôn Vạn Sa, khu vực Tản Hồng", lat:21.2350, lng:105.4012, price:"19 - 23 triệu/m²"},
"chu quyen": {name:"Thôn Chu Quyến, khu vực Chu Minh", lat:21.2400, lng:105.3900, price:"17 - 21 triệu/m²"}
};

function normalize(str){
return str.toLowerCase().normalize("NFD")
.replace(/[\u0300-\u036f]/g,"")
.replace(/đ/g,"d");
}

let currentData=null;
let paid=false;

function start(){
let val=document.getElementById("input").value.trim();
if(!val) return;

let key=normalize(val);

currentData=locations[key] || {
name:"Thôn "+val.charAt(0).toUpperCase()+val.slice(1)+", khu vực chưa xác định",
lat:21.2333,
lng:105.4000,
price:"18 - 22 triệu/m²"
};

document.getElementById("locationName").innerText=currentData.name;
document.getElementById("priceTop").innerText=currentData.price;
document.getElementById("card").style.display="block";

document.getElementById("qrImg").src=
`https://img.vietqr.io/image/LPBANK-033963180001-compact2.png?amount=5000&addInfo=${encodeURIComponent("BaoCao "+val)}&t=${Date.now()}`;

paid=false;
}

function unlock(){
paid=true;

confetti({particleCount:150,spread:90});

document.getElementById("payBox").style.display="none";
document.getElementById("radar").style.display="none";
document.getElementById("mapImg").style.display="none";

document.getElementById("mapFrame").src=
`https://www.google.com/maps?q=${currentData.lat},${currentData.lng}&t=k&z=18&output=embed`;

document.getElementById("mapFrame").style.display="block";
document.getElementById("btnView").style.display="block";
}

function showResult(){

if(!paid){
alert("Vui lòng thanh toán trước khi xem kết quả.");
return;
}

document.getElementById("resultBox").style.display="block";
document.getElementById("shareBox").style.display="block";
document.getElementById("btnView").style.display="none";

document.getElementById("resultBox").innerText=

"=== PHÂN TÍCH CƠ BẢN ===\n\n"+
"Địa điểm: "+currentData.name+"\n"+
"Giá tham khảo: "+currentData.price+"\n"+
"Thanh khoản: Ổn định\n"+
"Vị trí: Gần khu dân cư, tiếp cận thuận tiện\n\n"+

"=== NÂNG CẤP 2: QUY HOẠCH & HẠ TẦNG ===\n"+
"Định hướng sử dụng đất: Đất ở nông thôn\n"+
"Hệ tọa độ: VN-2000\n"+
"Khả năng tăng giá: Trung bình - khá\n"+
"Yếu tố hỗ trợ: Hạ tầng cải thiện\n\n"+

"=== NÂNG CẤP 3: CHIẾN LƯỢC ===\n"+
"✔ Phù hợp đầu tư dài hạn\n"+
"✔ Phù hợp xây dựng ở thực\n"+
"✔ Tích sản 3-5 năm\n\n"+

"Chỉ số tổng hợp: 7.5/10\n\n"+

"✨ 'Mua vàng thì lỗ, mua thổ thì lời.'";

}

setInterval(() => {
const names=["Anh Tuấn","Chị Lan","Chú Hùng","Môi giới 24h"];
const toast=document.createElement('div');
toast.style.position="fixed";
toast.style.bottom="20px";
toast.style.left="20px";
toast.style.background="#111";
toast.style.color="#0f0";
toast.style.padding="10px";
toast.style.borderRadius="8px";
toast.innerHTML=`💰 <b>${names[Math.floor(Math.random()*names.length)]}</b> vừa check thành công!`;
document.body.appendChild(toast);
setTimeout(()=>toast.remove(),4000);
},12000);

</script>
</body>
</html>
